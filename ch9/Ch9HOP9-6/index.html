<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact Form</title>
        <style>
            form {
                background-color: #eaeaea;
                font-family: arial, sans-serif;
                width: 350px; padding: 10px;
            }
            label {
                float: left; clear: left; display: block;
                width: 100px; padding-right: 10px;
                margin-top: 10px; text-align: right;
            }
            input { 
                display: block; margin-top: 10px;
            }
            textarea {
                display: block; margin-top: 10px;
            }
            input[type="submit"] { margin-left: 110px; }
        </style>
    </head>
    <body>
        <form>
            <label for="myName">Name:</label>
            <input type="text" for="myName" id="myName"></input>
            <label for="myEmail">E-Mail:</label>
            <input type="text" for="myEmail" id="myEmail"></input>
            <label for="myComments">Comments:</label>
            <textarea name="MyComments" id="MyComments" rows="2" cols="20"></textarea>
            <input type="submit" value="Submit">
        </form>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Example</title>
</head>
<body>
    <h1>Tell us about yourself!</h1>
    <form action="https://webdevbasics.net/scripts/demo.php" method="post">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" maxlength="30"><br><br>

        <label for="pword">Password:</label>
        <input type="password" id="pword" name="pword"><br><br>

        <p>Favorite Day of the Week:</p>
        <input type="radio" name="favday" value="Monday"> Monday<br>
        <input type="radio" name="favday" value="Tuesday"> Tuesday<br>
        <input type="radio" name="favday" value="Wednesday"> Wednesday<br>
        <input type="radio" name="favday" value="Thursday"> Thursday<br>
        <input type="radio" name="favday" value="Friday"> Friday<br>
        <input type="radio" name="favday" value="Saturday"> Saturday<br>
        <input type="radio" name="favday" value="Sunday"> Sunday<br><br>

        <label for="social">Favorite Social Networking Site:</label>
        <select id="social" name="social">
            <option value="facebook">Facebook</option>
            <option value="instagram">Instagram</option>
            <option value="linkedin">LinkedIn</option>
            <option value="handshake">Handshake</option>
        </select><br><br>

        <fieldset>
            <legend>Shipping Address</legend>

            <label for="addressline1">Address Line 1:</label>
            <input type="text" id="address1" name="address1"><br><br>

            <label for="addressline2">Address Line 2:</label>
            <input type="text" id="address2" name="address2"><br><br>

            <label for="city">City:</label>
            <input type="text" id="city" name="city"><br><br>

            <label for="state">State:</label>
            <input type="text" id="state" name="state"><br><br>

            <label for="zip">Zip Code:</label>
            <input type="text" id="zip" name="zip"><br><br>
        </fieldset><br>

        <input type="image" src="assets/signup.gif" alt="totally not sketchy button">

        <input type="hidden" name="userid">
    </form>
</body>
</html>

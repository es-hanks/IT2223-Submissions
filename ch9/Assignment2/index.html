<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Example 2</title>
    <style>
form {
    width: 400px;
    padding: 10px;
}

label {
    margin-top: 10px;
}

input, textarea, select {
    margin-top: 5px;
    margin: 10px;
}
    </style>
</head>
<body>

<form method="get">
    <fieldset>
        <legend>Music Information: </legend>
        <label for="comments">Favorite Songs:</label>
        <textarea name="comments" id="comments" rows="3" cols="40"></textarea>

        <p>Favorite Instrument:</p>

        <input type="radio" name="favinstrument" value="Piano" id="piano">
        <label for="piano">Piano</label>

        <input type="radio" name="favinstrument" value="Guitar" id="guitar">
        <label for="guitar">Guitar</label>

        <input type="radio" name="favinstrument" value="Triangle" id="triangle">
        <label for="triangle">Triangle</label><br><br>

        <label for="favgenre">Favorite Genre:</label><br>
        <select id="favgenre" name="favgenre" size="3">
            <option value="Rock">Rock</option>
            <option value="Pop">Pop</option>
            <option value="Blues">Blues</option>
            <option value="Alternative">Alternative</option>
        </select><br>
    </fieldset>

    <fieldset>
    <legend>User Information</legend>

    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="dob"><br>

        <label for="name">Name:</label>
        <input type="text" name="name" id="name"><br>

        <label for="email">E-Mail:</label>
        <input type="email" name="email" id="email">
    </fieldset>

    <input type="submit" value="Submit">
    <input type="reset" value="Reset">
</form>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Table Test</title>
        <style>
            table { 
                margin: auto;
                border: 5px solid #000066;
                width: 600px;
                border-spacing: 0;
            }

            td, th {
                border-style: none;
                padding: 0.5em;
                font-family: Arial, sans-serif;
            }

            caption { 
                font-family: Verdana, sans-serif;
                font-weight: bold;
                font-size: 1.2em;
                padding-bottom: 0.5em;
            }

            .altrow {
                background-color: #eaeaea;
            }
        </style>
    </head>
    <body>
        <table>
        <caption>Lighthouse Island Bistro Specialty Coffee Menu</caption>
            <tr>
                <th id="drink name">Specialty Coffee</th>
                <th id="description">Description</th>
                <th id="price">Price</th>
            </tr>
            <tr class="altrow">
                <td headers="drink name">Lite Latte</td>
                <td headers="description">Indulge in a shot of espresso with steamed, skim milk.</td>
                <td headers="price">$3.50</td>
            </tr>
            <tr>
                <td headers="drink name">Mocha Latte</td>
                <td headers="description">Choose dark or milk chocolate with steamed milk.</td>
                <td headers="price">$4.00</td>
            </tr>
            <tr class="altrow">
                <td headers="drink name">MCP Latte</td>
                <td headers="description">A lucious mocha latte with caramel and pecan syrup.</td>
                <td headers="price">$4.50</td>
            </tr>
        </table>
    </body>
</html>
